name: Without-Concurrency Demo

on: workflow_dispatch

concurrency:
  group: main-branch-group
  cancel-in-progress: true #this will cancel the previous running workflow and trigger new workflow execution
  #cancel-in-progress: false # this will not cancel thhe previous running workflow instead it sits in a queue, once the previous once completed the execution the new one will start

jobs:
  demo:
    runs-on: ubuntu-latest
    steps:
      - run: echo "Running workflow"
      - run: sleep 300
      - run: echo "Finished"