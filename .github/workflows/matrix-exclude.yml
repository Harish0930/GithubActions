name: Matrix Exclude example

on: workflow_dispatch

jobs:
    Matrix-Exclude:
        runs-on: ${{matrix.os}}
        strategy:
            matrix:
                os: [ubuntu-latest, windows-latest]
                node: [16,17]
                exclude:
                    - os: ubuntu-latest
                      node: 17
        steps:
            - name: OS name
              run: echo "$matrix.os $matrix.node"

            - name: name
              run: echo "${{matrix.os}}, ${{matrix.node}}"