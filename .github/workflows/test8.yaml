name: Artifact upload and download artifact

on: [workflow_dispatch]

jobs:
    job1-upload-artifact:
        runs-on: ubuntu-latest
        steps:
            - name: create a file
              run: echo "data file" > data.txt
            
            - name: upload file as a artificat
              uses: actions/upload-artifact@v7
              with:
                name: datafile
                path: data.txt
    
    job2-download-artifact:
        runs-on: ubuntu-latest
        needs: job1-upload-artifact
        steps:
            - name: download artifact
              uses: actions/download-artifact@v8
              with:
                name: datafile
            
            - name: show file content
              run: cat data.txt