name: Matrix Include example

on: workflow_dispatch

jobs:
    Include-example:
        runs-on: ${{matrix.os}}
        strategy:
            matrix:
                os: [ubuntu-latest, windows-latest]
                node: [17.18]
                include:
                    - os: ubuntu-latest
                      node: 18
                      message: optimized-build
        steps:
            - run: |
                echo "OS: ${{matrix.os}}"
                echo "Node-Version: ${{matrix.node}}"
                echo "Message: ${{matrix.message}}"